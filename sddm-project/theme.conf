[General]
# Phase 1 static snapshot. These values are deliberately separate from
# Main.qml so Phase 2 can replace them without generating structural QML.

Background=assets/background.png
Greeting=Welcome back
ClockFormat=h:mm AP
DateFormat=dddd, MMMM d

# HoneycombTheme.qml-derived palette.
ColorBackground=#5E5E5E
ColorForeground=#ECECEC
ColorAccent=#FFFFFF
ColorUrgent=#E05252
ColorMuted=#9A9A9A
ColorSurface=#4E4E4E
ColorHover=#6C6C6C
ColorBorder=#35E0B4

FontFamily=JetBrainsMono Nerd Font Propo
Radius=6

# Layout offsets reserved for the future Quickshell SDDM settings page.
ClockXOffset=0
ClockYOffset=0
LoginXOffset=0
LoginYOffset=0
ClockScalePercent=100
ClockShadowOpacityPercent=56
ClockShadowXOffset=2
ClockShadowYOffset=2
LoginScalePercent=100
LoginPanelWidth=430
LoginPanelSpacing=14
